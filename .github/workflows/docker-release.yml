# Owner(s): ["oncall: releng"]
name: Build Official Docker Images

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - docker.Makefile
      - .github/workflows/docker-release.yml
      - .github/scripts/generate_docker_release_matrix.py
      - .github/scripts/generate_binary_build_matrix.py
  push:
    branches:
      - nightly
    tags:
      # Final Release tags look like: v1.11.0
      - v[0-9]+.[0-9]+.[0-9]+
      # Release candidate tags look like: v1.11.0-rc1
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
      - ciflow/nightly/*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

env:
  BUILD_PROGRESS: plain
  BUILD_TYPE: official
  DOCKER_ORG: pytorch
  DOCKER_REGISTRY: ghcr.io
  NO_BUILD_SUFFIX: true
  USE_BUILDX: 1
  WITH_PUSH: ${{ github.event_name == 'push' && (github.event.ref == 'refs/heads/nightly' || startsWith(github.event.ref, 'refs/tags/v')) }}

permissions: read-all

jobs:
  get-label-type:
    if: github.repository_owner == 'pytorch'
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}

  generate-matrix:
    if: github.repository_owner == 'pytorch'
    needs: get-label-type
    runs-on: "${{ needs.get-label-type.outputs.label-type }}linux.large"
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
      manifest-matrix: ${{ steps.generate-matrix.outputs.manifest-matrix }}
    steps:
      - name: Checkout PyTorch
        uses: pytorch/pytorch/.github/actions/checkout-pytorch@main
        with:
          fetch-depth: 1
          submodules: 'false'
      - name: Get docker release matrix
        id: generate-matrix
        run: |
          MATRIX_BLOB="$(python3 .github/scripts/generate_docker_release_matrix.py)"
          MANIFEST_MATRIX_BLOB="$(python3 - "${MATRIX_BLOB}" <<'PY'
import json
import sys

build_matrix = json.loads(sys.argv[1])["include"]
seen = set()
manifest_entries = []
for item in build_matrix:
    if item["cuda"] == "cpu":
        continue
    key = (
        item["cuda"],
        item["cuda_full_version"],
        item["cudnn_version"],
        item["image_type"],
    )
    if key in seen:
        continue
    seen.add(key)
    manifest_entries.append(
        {
            "cuda": item["cuda"],
            "cuda_full_version": item["cuda_full_version"],
            "cudnn_version": item["cudnn_version"],
            "image_type": item["image_type"],
        }
    )

print(json.dumps({"include": manifest_entries}))
PY
)"
          echo "${MATRIX_BLOB}"
          echo "matrix=${MATRIX_BLOB}" >> "${GITHUB_OUTPUT}"
          echo "manifest-matrix=${MANIFEST_MATRIX_BLOB}" >> "${GITHUB_OUTPUT}"

  build:
    if: ${{ github.repository == 'pytorch/pytorch' }}
    runs-on: "${{ needs.get-label-type.outputs.label-type }}${{ matrix.runner }}"
    environment: ${{ (github.ref == 'refs/heads/nightly' || startsWith(github.event.ref, 'refs/tags/v')) && 'docker-build' || '' }}
    timeout-minutes: 240
    needs:
      - generate-matrix
      - get-label-type
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
    env:
      BUILD_IMAGE_TYPE: ${{ matrix.image_type }}
      BUILD_PLATFORMS: ${{ matrix.platform }}
      BUILD_ARCH: ${{ matrix.arch }}
      CUDA_VERSION: ${{ matrix.cuda_full_version }}
      CUDA_VERSION_SHORT: ${{ matrix.cuda }}
      CUDNN_VERSION: ${{ matrix.cudnn_version }}
    steps:
      - name: Setup SSH (Click me for login details)
        uses: pytorch/test-infra/.github/actions/setup-ssh@main
        with:
          github-secret: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Linux
        uses: pytorch/pytorch/.github/actions/setup-linux@main
        with:
          submodules: 'false'

      - name: Login to ECR
        uses: ./.github/actions/ecr-login

      - name: Login to GitHub Container Registry
        if: ${{ env.WITH_PUSH == 'true' }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: pytorch
          password: ${{ secrets.GHCR_PAT }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
        with:
          version: latest
          driver-opts: image=moby/buildkit:v0.19.0
      - name: Setup job specific variables
        run: |
          set -eou pipefail
          # Generate PyTorch version to use
          {
            echo "PYTORCH_VERSION=$(python3 .github/scripts/generate_pytorch_version.py --no-build-suffix)";
            echo "STABLE_CUDA_VERSION=$(python3 .github/scripts/get_ci_variable.py --stable-cuda-version)"
          } >> "${GITHUB_ENV}"
      - name: Setup test specific variables
        if: ${{ startsWith(github.event.ref, 'refs/tags/v') }}
        run: |
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            {
              echo "DOCKER_IMAGE=pytorch-test";
              echo "INSTALL_CHANNEL=whl/test";
              echo "TRITON_VERSION=$(cut -f 1 .ci/docker/triton_version.txt)";
            } >> "${GITHUB_ENV}"
          fi
      - name: Setup nightly specific variables
        if: ${{ github.event_name == 'pull_request' || github.event.ref == 'refs/heads/nightly' || startsWith(github.event.ref, 'refs/tags/ciflow/nightly/') }}
        run: |
          {
            echo "DOCKER_IMAGE=pytorch-nightly";
            echo "INSTALL_CHANNEL=whl/nightly";
            echo "TRITON_VERSION=$(cut -f 1 .ci/docker/triton_version.txt)+$(cut -c -10 .ci/docker/ci_commit_pins/triton.txt)";
          } >> "${GITHUB_ENV}"
      - name: Run docker build / push
        # WITH_PUSH is used here to determine whether or not to add the --push flag.
        # We only append an arch-specific suffix for CUDA images while publishing.
        run: |
          set -eou pipefail
          DOCKER_TAG_SUFFIX=""
          if [[ "${WITH_PUSH}" == "true" && "${CUDA_VERSION_SHORT}" != "cpu" ]]; then
            DOCKER_TAG_SUFFIX="-${BUILD_ARCH}"
          fi
          make -f docker.Makefile "${BUILD_IMAGE_TYPE}-image" DOCKER_TAG_SUFFIX="${DOCKER_TAG_SUFFIX}"

      - name: Teardown Linux
        uses: pytorch/test-infra/.github/actions/teardown-linux@main
        if: always()

  publish-manifests:
    if: ${{ github.repository == 'pytorch/pytorch' && env.WITH_PUSH == 'true' }}
    runs-on: "${{ needs.get-label-type.outputs.label-type }}linux.2xlarge"
    environment: ${{ (github.ref == 'refs/heads/nightly' || startsWith(github.event.ref, 'refs/tags/v')) && 'docker-build' || '' }}
    timeout-minutes: 240
    needs:
      - build
      - generate-matrix
      - get-label-type
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.manifest-matrix) }}
      fail-fast: false
    env:
      BUILD_IMAGE_TYPE: ${{ matrix.image_type }}
      CUDA_VERSION: ${{ matrix.cuda_full_version }}
      CUDA_VERSION_SHORT: ${{ matrix.cuda }}
      CUDNN_VERSION: ${{ matrix.cudnn_version }}
    steps:
      - name: Setup SSH (Click me for login details)
        uses: pytorch/test-infra/.github/actions/setup-ssh@main
        with:
          github-secret: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Linux
        uses: pytorch/pytorch/.github/actions/setup-linux@main
        with:
          submodules: 'false'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: pytorch
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
        with:
          version: latest
          driver-opts: image=moby/buildkit:v0.19.0

      - name: Setup job specific variables
        run: |
          set -eou pipefail
          {
            echo "PYTORCH_VERSION=$(python3 .github/scripts/generate_pytorch_version.py --no-build-suffix)";
            echo "STABLE_CUDA_VERSION=$(python3 .github/scripts/get_ci_variable.py --stable-cuda-version)"
          } >> "${GITHUB_ENV}"

      - name: Setup test specific variables
        if: ${{ startsWith(github.event.ref, 'refs/tags/v') }}
        run: |
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            {
              echo "DOCKER_IMAGE=pytorch-test";
            } >> "${GITHUB_ENV}"
          fi

      - name: Setup nightly specific variables
        if: ${{ github.event.ref == 'refs/heads/nightly' || startsWith(github.event.ref, 'refs/tags/ciflow/nightly/') }}
        run: |
          {
            echo "DOCKER_IMAGE=pytorch-nightly";
          } >> "${GITHUB_ENV}"

      - name: Assemble multi-arch manifests
        run: |
          set -eou pipefail
          IMAGE_NAME="${DOCKER_IMAGE:-pytorch}"
          PYTORCH_DOCKER_TAG="${PYTORCH_VERSION}-cuda${CUDA_VERSION_SHORT}-cudnn${CUDNN_VERSION}-${BUILD_IMAGE_TYPE}"
          docker buildx imagetools create \
            -t "ghcr.io/pytorch/${IMAGE_NAME}:${PYTORCH_DOCKER_TAG}" \
            "ghcr.io/pytorch/${IMAGE_NAME}:${PYTORCH_DOCKER_TAG}-amd64" \
            "ghcr.io/pytorch/${IMAGE_NAME}:${PYTORCH_DOCKER_TAG}-arm64"

      - name: Push nightly tags
        if: ${{ github.event.ref == 'refs/heads/nightly' && matrix.image_type == 'runtime' }}
        run: |
          set -eou pipefail
          IMAGE_NAME="${DOCKER_IMAGE:-pytorch}"
          PYTORCH_DOCKER_TAG="${PYTORCH_VERSION}-cuda${CUDA_VERSION_SHORT}-cudnn${CUDNN_VERSION}-runtime"
          CUDA_SUFFIX="-cu${CUDA_VERSION}"
          PYTORCH_NIGHTLY_COMMIT=$(docker run --platform linux/amd64 "ghcr.io/pytorch/${IMAGE_NAME}:${PYTORCH_DOCKER_TAG}" \
                                          python -c 'import torch; print(torch.version.git_version[:7],end="")')

          docker buildx imagetools create \
            -t "ghcr.io/pytorch/${IMAGE_NAME}:${PYTORCH_NIGHTLY_COMMIT}${CUDA_SUFFIX}" \
            "ghcr.io/pytorch/${IMAGE_NAME}:${PYTORCH_DOCKER_TAG}"

          # Please note, here we need to pin specific version of CUDA as with latest label
          if [[ ${CUDA_VERSION_SHORT} == "${STABLE_CUDA_VERSION}" ]]; then
            docker buildx imagetools create \
              -t "ghcr.io/pytorch/${IMAGE_NAME}:latest" \
              "ghcr.io/pytorch/${IMAGE_NAME}:${PYTORCH_NIGHTLY_COMMIT}${CUDA_SUFFIX}"
          fi

      - name: Teardown Linux
        uses: pytorch/test-infra/.github/actions/teardown-linux@main
        if: always()

  validate:
    needs: publish-manifests
    if: ${{ github.event_name == 'push' && (github.event.ref == 'refs/heads/nightly' || startsWith(github.event.ref, 'refs/tags/v')) }}
    uses: pytorch/test-infra/.github/workflows/validate-docker-images.yml@main
    with:
      channel: nightly
      ref: main
